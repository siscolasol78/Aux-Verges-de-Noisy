<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Stock Pro</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* --- CORE APPLE DESIGN LANGUAGE --- */
        :root {
            /* Couleurs Système iOS */
            --system-blue: #007aff;
            --system-green: #34c759;
            --system-red: #ff3b30;
            --system-gray: #8e8e93;
            --system-background: #f2f2f7; /* Gris très clair iOS 13+ */
            --system-card: #ffffff;
            
            /* Typographie */
            --font-stack: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji";
            
            /* Effets */
            --blur-background: rgba(255, 255, 255, 0.7);
            --blur-effect: blur(20px) saturate(180%);
            --shadow-card: 0 2px 8px rgba(0,0,0,0.04);
        }

        /* Désactiver la sélection de texte et le zoom sur mobile pour un effet "App Native" */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        
        body { 
            font-family: var(--font-stack); 
            background-color: var(--system-background); 
            color: #000; 
            margin: 0; 
            padding: 0;
            padding-bottom: 150px; /* Espace pour la barre de total flottante */
            -webkit-font-smoothing: antialiased;
        }

        /* --- BARRE DE NAVIGATION (iOS STYLE) --- */
        .nav-bar {
            position: sticky;
            top: 0;
            z-index: 1000;
            background-color: var(--blur-background);
            -webkit-backdrop-filter: var(--blur-effect);
            backdrop-filter: var(--blur-effect);
            border-bottom: 0.5px solid rgba(0,0,0,0.1); /* Bordure ultra-fine */
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .nav-bar h1 { 
            margin: 0; 
            font-weight: 700; 
            font-size: 1.1rem; 
            letter-spacing: -0.5px;
        }

        /* Bouton Tout Effacer (Caché par défaut, apparaît quand on tape dans la recherche ou qu'il y a du stock) */
        .btn-action-danger {
            background: none;
            border: none;
            color: var(--system-red);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            padding: 0;
            transition: opacity 0.2s;
        }
        .btn-action-danger:active { opacity: 0.5; }

        .container { max-width: 600px; margin: auto; padding: 15px; }

        /* --- BARRE DE RECHERCHE (iOS STYLE) --- */
        .search-container {
            margin-bottom: 20px;
            position: relative;
        }
        
        .search-box { 
            width: 100%;
            padding: 12px 15px 12px 40px; /* Espace pour l'icône loupe */
            border: none; 
            border-radius: 12px; 
            background-color: rgba(142, 142, 147, 0.12); /* Gris recherche iOS */
            font-size: 1rem;
            color: #000;
            outline: none;
            transition: background-color 0.2s;
        }
        .search-box:focus { background-color: rgba(142, 142, 147, 0.2); }
        .search-box::placeholder { color: #8e8e93; }

        .search-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #8e8e93;
            font-size: 1rem;
            pointer-events: none;
        }

        /* --- CARTES ARTICLES (iOS TABLE STYLE) --- */
        .item-card { 
            background-color: var(--system-card);
            border-radius: 12px;
            padding: 18px;
            margin-bottom: 12px;
            box-shadow: var(--shadow-card);
            transition: transform 0.1s ease-out, box-shadow 0.1s ease-out;
        }

        /* Effet de pression quand on clique (micro-animation Apple) */
        .item-card:active {
            transform: scale(0.97);
            box-shadow: 0 1px 4px rgba(0,0,0,0.02);
        }

        .item-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 15px; 
        }

        .item-name { font-weight: 600; font-size: 1.1rem; letter-spacing: -0.3px; }

        /* Section Prix */
        .price-section {
            display: flex;
            align-items: center;
            gap: 5px;
            background-color: #f2f2f7;
            padding: 6px 12px;
            border-radius: 8px;
        }

        .price-input {
            width: 70px;
            border: none;
            background: transparent;
            font-weight: 700;
            font-size: 1rem;
            color: var(--system-blue);
            text-align: right;
            outline: none;
            font-feature-settings: "tnum"; /* Chiffres tubulaires pour alignement */
        }
        .price-input::placeholder { color: rgba(0,122,255, 0.3); }

        /* --- GRILLE DE BOUTONS (iOS ACTION STYLE) --- */
        .qty-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }

        .qty-grid button {
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: background-color 0.1s;
        }

        /* Boutons principaux (+1, +1.5) */
        .btn-main-qty { 
            background-color: rgba(0, 122, 255, 0.1); 
            color: var(--system-blue); 
        }
        .btn-main-qty:active { background-color: rgba(0, 122, 255, 0.2); }

        /* Boutons secondaires (+2, +3, +5) */
        .btn-secondary-qty {
            background-color: #f2f2f7;
            color: #000;
        }
        .btn-secondary-qty:active { background-color: #e5e5ea; }

        /* Bouton Reset (0) */
        .btn-reset-qty {
            background-color: #f2f2f7;
            color: var(--system-red);
        }
        .btn-reset-qty:active { background-color: rgba(255, 59, 48, 0.1); }

        /* --- ZONE CONTRÔLE QUANTITÉ --- */
        .qty-control-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 0.5px solid rgba(0,0,0,0.05);
        }

        .qty-label { font-size: 0.85rem; font-weight: 600; color: #8e8e93; text-transform: uppercase; letter-spacing: 0.5px; }

        .qty-badge {
            font-weight: 700;
            font-size: 1.3rem;
            color: var(--system-blue);
            font-feature-settings: "tnum";
        }

        /* --- BARRE DE TOTAL FLOTTANTE (iOS DOCK STYLE) --- */
        .footer-total {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background-color: rgba(0, 0, 0, 0.85); /* Noir iOS Dock */
            -webkit-backdrop-filter: blur(15px);
            backdrop-filter: blur(15px);
            color: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            z-index: 2000;
        }

        .total-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .total-label { opacity: 0.7; font-weight: 600; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.5px; }
        .total-amount { font-size: 1.7rem; font-weight: 800; color: #fff; letter-spacing: -0.5px; font-feature-settings: "tnum"; }

        /* Groupe Boutons Partage */
        .share-group {
            display: flex;
            gap: 10px;
        }

        .btn-share {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: opacity 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-share:active { opacity: 0.7; }

        .btn-full { background-color: var(--system-blue); color: white; }
        .btn-light { background-color: rgba(255,255,255,0.15); color: white; }

        /* --- TITRES DE SECTION (iOS GROUPED TABLE STYLE) --- */
        .section-title {
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #6d6d72; /* Gris titre section iOS */
            margin: 30px 15px 10px;
            font-size: 0.85rem;
        }

        /* Micro-animation de chargement */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .item-card { animation: fadeIn 0.3s ease-out; }
    </style>
</head>
<body>

<div class="nav-bar">
    <h1><i class="fa-solid fa-box-archive" style="color:var(--system-blue); margin-right:5px;">
    </i>Stock Pro</h1>
    <button class="btn-action-danger" onclick="resetEverything()">Tout effacer</button>
</div>

<div class="container">
    <div class="search-container">
        <i class="fa-solid fa-magnifying-glass search-icon"></i>
        <input type="text" id="search" class="search-box" placeholder="Rechercher un produit..." onkeyup="filterItems()">
    </div>

    <div id="item-list"></div>
</div>

<div class="footer-total">
    <div class="total-header">
        <span class="total-label">Total Estimé</span>
        <span class="total-amount"><span id="grand-total">0.00</span> €</span>
    </div>
    <div class="share-group">
        <button class="btn-share btn-full" onclick="share('all')">
            <i class="fa-solid fa-square-share-nodes"></i>Partager Panier
        </button>
        <button class="btn-share btn-light" onclick="share('prices')">
            <i class="fa-solid fa-list-ul"></i>Prix Seuls
        </button>
    </div>
</div>

<script>
    const articles = [
        "AIL", "ANANAS à couper", "ANANAS p de sucre", "ANANAS victoria", "ARTICHAUT artichaut 2", "ARTICHAUT poivrade", "AUBERGINE", "AUBERGINE longue", "AVOCAT", "avocat 2", "BANANE", "BETTERAVE", "Blette", "BROCOLI", "brocoll 2", "BUTTERNUT", "CAROTTE", "CAROTTE bt", "CAROTTE SABLE", "Celeri", "CELERI rave", "CERISE", "CH blancs rouges", "CH bruxelles", "CH fleurs", "CH frisé", "CH pointu", "CHAMPI", "CHAMPI blancs", "CHAMPI bruns", "CHAMPI trompette", "CITRON", "CITRON bergamote", "CITRON BIO", "CITRON VERT", "CLEM 2", "CLEM CORSE", "CLEM SOCU", "COCO PLAT", "CONCOMB", "concombre 2", "COURGETTE", "COURGETTE blanche", "COURGETTE ronde", "ECHALOTE", "ENDIVE", "endive 2", "EPINARD", "FENOUIL", "FEVE", "FIGUE", "FRAISE BELGE", "FRAISE CHARLOTTE", "FRAISE DREAM", "FRAISE GARIGUETTE", "FRAISE MAGNUM", "FRAISE patissier", "FRAISE promo", "FRAMBOISE", "framboise 2", "FRESINETTE", "FS ABRICOT", "FS DATTES", "FS PRUNEAUX", "GINGEMBRE", "GRENADE", "GRENADILLE", "HARICOT barquette", "HARICOT ex", "HARICOT France", "KAKI DUR", "KIWI", "KIWIGOLD", "LITCHEE", "litchee 2", "MACHE", "MANGOUSTAN", "MANGUE", "mangue 2", "MARRON", "MELON", "MESCLUM", "MINI conc", "MINI POIVRON", "MURE", "MYRTILLE", "mvrtille 2", "NAVET", "NAVET bt", "NOIX", "OIGNON", "OIGNON bi", "OIGNON Roscoff", "OIGNON rouge", "Orange de Sicile", "Orange jus", "Orange SOCU", "Orange table", "Orange Tarocco", "PANAIS", "Pamplemousse", "Passion", "Passion Gold", "PATATE DOUCE", "PDT charlotte", "PDT grenaille", "PDT mona", "PETIT POIS", "PETIT POIS barquette", "POIRE 2", "Poire Comice", "Poire Conférence", "POIREAU", "POIV jaune orange", "POIV rouge", "POIV vert", "POMME 2", "POMME BIO", "Pomme Boskoop", "Pomme Canada", "Pomme Chanteclerc", "Pomme Clochard", "Pomme FUJI", "Pomme GALA", "Pomme Golden", "Pomme Granny", "Pomme Patte de Loup", "Pomme Pink lady", "Pomme ROCKIT", "Pomme Rubinette", "POTIMARRON", "POTIRON", "RADIS NOIR", "RADIS ROSE", "RADIS ROUGE", "Raisin sans pépins Blanc", "Raisin sans pépins rose", "RHUBARBE", "ROMANESCO", "Salade Batavia", "Salade Batavia X 12", "Salade Feuille de chêne", "Salade Frisée", "Salade Laitue", "Salade Rougette", "Salade Scarole", "Sucrine", "Tomate 2", "Tomate Cerise", "Tomate Jouno", "Tomate Jouno vrac",
        "TITRE_HERBES",
        "ANETH", "Basilic", "Ciboulette", "Coriandre", "Estragon", "Menthe", "Oseille", "PERSIL", "Thym laurier"
    ];

    const data = {};

    function init() {
        const listEl = document.getElementById('item-list');
        articles.forEach((name, index) => {
            if(name === "TITRE_HERBES") {
                const h = document.createElement('div');
                h.className = 'section-title';
                h.innerText = "🌿 Aromates & Herbes";
                listEl.appendChild(h);
                return;
            }

            data[name] = { qty: 0, price: 0 };
            const card = document.createElement('div');
            card.className = 'item-card';
            // Animation décalée pour l'effet d'apparition
            card.style.animationDelay = `${index * 20}ms`; 

            card.innerHTML = `
                <div class="item-header">
                    <span class="item-name">${name}</span>
                    <div class="price-section">
                        <input type="number" step="0.01" class="price-input" id="p-${name}" placeholder="0.00" oninput="updatePrice('${name}', this.value)" pattern="[0-9]*" inputmode="decimal">
                        <span style="font-weight:600; color:#8e8e93; font-size:0.9rem">€</span>
                    </div>
                </div>
                <div class="qty-grid">
                    <button class="btn-main-qty" onclick="updateQty('${name}', 1)">+1</button>
                    <button class="btn-main-qty" onclick="updateQty('${name}', 1.5)">+1.5</button>
                    <button class="btn-secondary-qty" onclick="updateQty('${name}', 2)">+2</button>
                    <button class="btn-secondary-qty" onclick="updateQty('${name}', 3)">+3</button>
                    <button class="btn-secondary-qty" onclick="updateQty('${name}', 5)">+5</button>
                    <button class="btn-reset-qty" onclick="updateQty('${name}', 0, true)">0</button>
                </div>
                <div class="qty-control-area">
                    <span class="qty-label">Quantité</span>
                    <span class="qty-badge" id="q-${name}">0</span>
                </div>
            `;
            listEl.appendChild(card);
        });
    }

    function updateQty(name, val, reset = false) {
        if(reset) data[name].qty = 0;
        else data[name].qty += val;
        // Animation subtile sur le badge quand la quantité change
        const badge = document.getElementById(`q-${name}`);
        badge.innerText = data[name].qty;
        badge.style.transform = "scale(1.2)";
        badge.style.transition = "transform 0.1s ease-out";
        setTimeout(() => badge.style.transform = "scale(1)", 100);
        
        calculateTotal();
    }

    function updatePrice(name, val) {
        data[name].price = parseFloat(val) || 0;
        calculateTotal();
    }

    function calculateTotal() {
        let total = 0;
        for (let item in data) {
            total += data[item].qty * data[item].price;
        }
        document.getElementById('grand-total').innerText = total.toFixed(2);
    }

    function resetEverything() {
        // Confirmation native iOS style
        if(confirm("Voulez-vous vraiment effacer TOUT l'inventaire (quantités et prix) ?")) {
            for (let name in data) {
                data[name].qty = 0;
                data[name].price = 0;
                if(document.getElementById(`q-${name}`)) document.getElementById(`q-${name}`).innerText = "0";
                if(document.getElementById(`p-${name}`)) document.getElementById(`p-${name}`).value = "";
            }
            calculateTotal();
            window.scrollTo({top: 0, behavior: 'smooth'});
        }
    }

    function filterItems() {
        let q = document.getElementById('search').value.toLowerCase();
        let cards = document.getElementsByClassName('item-card');
        Array.from(cards).forEach(card => {
            let name = card.querySelector('.item-name').innerText.toLowerCase();
            card.style.display = name.includes(q) ? 'flex' : 'none';
        });
    }

    function share(type) {
        let text = type === 'all' ? "🛒 INVENTAIRE DU JOUR\n" : "💰 TARIFS UNITAIRES\n";
        let hasData = false;
        for (let item in data) {
            if (data[item].qty > 0 || data[item].price > 0) {
                if (type === 'all' && data[item].qty > 0) {
                    let st = data[item].qty * data[item].price;
                    text += `\n• ${item} : ${data[item].qty} x ${data[item].price}€ = ${st.toFixed(2)}€`;
                    hasData = true;
                } else if (type === 'prices' && data[item].price > 0) {
                    text += `\n• ${item} : ${data[item].price}€`;
                    hasData = true;
                }
            }
        }
        if (type === 'all') text += `\n\n💵 TOTAL : ${document.getElementById('grand-total').innerText} €`;
        if (!hasData) return alert("Rien à partager !");
        
        // Feuille de partage native iOS
        if (navigator.share) {
            navigator.share({ title: 'Inventaire Pro', text: text });
        } else {
            // Fallback pour navigateurs web de bureau
            navigator.clipboard.writeText(text);
            alert("Récapitulatif copié dans le presse-papier !");
        }
    }

    init();
</script>

</body>
</html>
