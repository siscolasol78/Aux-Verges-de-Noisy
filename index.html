<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Vergers de Noisy - Inventaire, achats et prix</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --brand-green: #2d6a4f; /* Vert Verger */
            --brand-light-green: #d8f3dc;
            --gold: #b79ced;
            --ios-bg: #f2f2f7;
            --ios-card: #ffffff;
            --system-red: #ff3b30;
            --text-dark: #1c1c1e;
            --text-muted: #8e8e93;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-color: var(--ios-bg); 
            color: var(--text-dark); 
            margin: 0; 
            padding-bottom: 160px;
            -webkit-font-smoothing: antialiased;
        }

        /* --- HEADER CLASSE --- */
        .header {
            background: var(--ios-card);
            padding: 40px 20px 20px;
            text-align: center;
            border-bottom: 0.5px solid rgba(0,0,0,0.1);
        }
        
        .header h1 { 
            margin: 0; 
            font-size: 1.6rem; 
            font-weight: 800; 
            letter-spacing: -0.5px;
            color: var(--brand-green);
            text-transform: uppercase;
        }

        .header p {
            margin: 5px 0 0;
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 500;
        }

        .nav-tools {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 15px 20px;
            display: flex;
            gap: 10px;
            border-bottom: 0.5px solid rgba(0,0,0,0.05);
        }

        .search-box { 
            flex: 1; 
            padding: 12px 15px 12px 40px; 
            border: none; 
            border-radius: 12px; 
            background: rgba(142, 142, 147, 0.12);
            font-size: 1rem;
            outline: none;
        }

        .search-container { position: relative; flex: 1; }
        .search-icon { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }

        .btn-reset-all {
            background: none;
            border: none;
            color: var(--system-red);
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
        }

        .container { max-width: 600px; margin: auto; padding: 15px; }

        /* --- CARTES ARTICLES --- */
        .item-card { 
            background: var(--ios-card);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            border: 1px solid rgba(0,0,0,0.02);
        }

        .item-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: flex-start; 
            margin-bottom: 15px; 
        }

        .item-name { font-weight: 700; font-size: 1.1rem; color: var(--text-dark); max-width: 65%; }

        .price-tag {
            background: var(--brand-light-green);
            padding: 8px 12px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .price-input {
            width: 65px;
            border: none;
            background: transparent;
            font-weight: 800;
            font-size: 1rem;
            color: var(--brand-green);
            text-align: right;
            outline: none;
        }

        .qty-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 15px;
        }

        .qty-grid button {
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-plus { background: var(--brand-green); color: white; }
        .btn-plus:active { transform: scale(0.95); opacity: 0.9; }
        
        .btn-opt { background: #f2f2f7; color: var(--text-dark); }
        .btn-zero { background: #fff1f0; color: var(--system-red); }

        .card-footer {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 0.5px solid #f2f2f7;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .qty-label { font-size: 0.75rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; }
        .qty-val { font-size: 1.4rem; font-weight: 800; color: var(--brand-green); }

        /* --- DOCK DE TOTAL --- */
        .dock {
            position: fixed;
            bottom: 25px;
            left: 15px;
            right: 15px;
            background: rgba(28, 28, 30, 0.95);
            backdrop-filter: blur(15px);
            padding: 20px;
            border-radius: 24px;
            color: white;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            z-index: 2000;
        }

        .total-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .total-amount { font-size: 1.8rem; font-weight: 800; color: #fff; }

        .btn-group { display: flex; gap: 10px; }
        
        .btn-main {
            flex: 1.2;
            background: var(--brand-green);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 14px;
            font-weight: 700;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-sec {
            flex: 1;
            background: rgba(255,255,255,0.15);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 14px;
            font-weight: 600;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
        }

        .btn-sec:active { background: rgba(255,255,255,0.25); }

        .section-title {
            margin: 35px 10px 15px;
            font-size: 0.85rem;
            font-weight: 800;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div class="header">
    <i class="fa-solid fa-leaf" style="color:var(--brand-green); font-size: 2rem; margin-bottom: 10px;"></i>
    <h1>Vergers de Noisy</h1>
    <p>Inventaire, Achats et Prix</p>
</div>

<div class="nav-tools">
    <div class="search-container">
        <i class="fa-solid fa-magnifying-glass search-icon"></i>
        <input type="text" id="search" class="search-box" placeholder="Rechercher..." onkeyup="filterItems()">
    </div>
    <button class="btn-reset-all" onclick="resetEverything()">Effacer</button>
</div>

<div class="container">
    <div id="item-list"></div>
</div>

<div class="dock">
    <div class="total-row">
        <span style="font-weight:600; opacity:0.7">TOTAL ESTIMÉ</span>
        <span class="total-amount"><span id="grand-total">0.00</span> €</span>
    </div>
    <div class="btn-group">
        <button class="btn-main" onclick="share('all')">
            <i class="fa-solid fa-cart-shopping"></i> Panier
        </button>
        <button class="btn-sec" onclick="share('prices')">
            <i class="fa-solid fa-tag"></i> Partager Prix
        </button>
    </div>
</div>

<script>
    const articles = [
        "AIL", "ANANAS à couper", "ANANAS p de sucre", "ANANAS victoria", "ARTICHAUT artichaut 2", "ARTICHAUT poivrade", "AUBERGINE", "AUBERGINE longue", "AVOCAT", "avocat 2", "BANANE", "BETTERAVE", "Blette", "BROCOLI", "brocoll 2", "BUTTERNUT", "CAROTTE", "CAROTTE bt", "CAROTTE SABLE", "Celeri", "CELERI rave", "CERISE", "CH blancs rouges", "CH bruxelles", "CH fleurs", "CH frisé", "CH pointu", "CHAMPI", "CHAMPI blancs", "CHAMPI bruns", "CHAMPI trompette", "CITRON", "CITRON bergamote", "CITRON BIO", "CITRON VERT", "CLEM 2", "CLEM CORSE", "CLEM SOCU", "COCO PLAT", "CONCOMB", "concombre 2", "COURGETTE", "COURGETTE blanche", "COURGETTE ronde", "ECHALOTE", "ENDIVE", "endive 2", "EPINARD", "FENOUIL", "FEVE", "FIGUE", "FRAISE BELGE", "FRAISE CHARLOTTE", "FRAISE DREAM", "FRAISE GARIGUETTE", "FRAISE MAGNUM", "FRAISE patissier", "FRAISE promo", "FRAMBOISE", "framboise 2", "FRESINETTE", "FS ABRICOT", "FS DATTES", "FS PRUNEAUX", "GINGEMBRE", "GRENADE", "GRENADILLE", "HARICOT barquette", "HARICOT ex", "HARICOT France", "KAKI DUR", "KIWI", "KIWIGOLD", "LITCHEE", "litchee 2", "MACHE", "MANGOUSTAN", "MANGUE", "mangue 2", "MARRON", "MELON", "MESCLUM", "MINI conc", "MINI POIVRON", "MURE", "MYRTILLE", "mvrtille 2", "NAVET", "NAVET bt", "NOIX", "OIGNON", "OIGNON bi", "OIGNON Roscoff", "OIGNON rouge", "Orange de Sicile", "Orange jus", "Orange SOCU", "Orange table", "Orange Tarocco", "PANAIS", "Pamplemousse", "Passion", "Passion Gold", "PATATE DOUCE", "PDT charlotte", "PDT grenaille", "PDT mona", "PETIT POIS", "PETIT POIS barquette", "POIRE 2", "Poire Comice", "Poire Conférence", "POIREAU", "POIV jaune orange", "POIV rouge", "POIV vert", "POMME 2", "POMME BIO", "Pomme Boskoop", "Pomme Canada", "Pomme Chanteclerc", "Pomme Clochard", "Pomme FUJI", "Pomme GALA", "Pomme Golden", "Pomme Granny", "Pomme Patte de Loup", "Pomme Pink lady", "Pomme ROCKIT", "Pomme Rubinette", "POTIMARRON", "POTIRON", "RADIS NOIR", "RADIS ROSE", "RADIS ROUGE", "Raisin sans pépins Blanc", "Raisin sans pépins rose", "RHUBARBE", "ROMANESCO", "Salade Batavia", "Salade Batavia X 12", "Salade Feuille de chêne", "Salade Frisée", "Salade Laitue", "Salade Rougette", "Salade Scarole", "Sucrine", "Tomate 2", "Tomate Cerise", "Tomate Jouno", "Tomate Jouno vrac",
        "TITRE_HERBES",
        "ANETH", "Basilic", "Ciboulette", "Coriandre", "Estragon", "Menthe", "Oseille", "PERSIL", "Thym laurier"
    ];

    const data = {};

    function init() {
        const listEl = document.getElementById('item-list');
        articles.forEach((name) => {
            if(name === "TITRE_HERBES") {
                const h = document.createElement('div');
                h.className = 'section-title';
                h.innerText = "🍃 Herbes Aromatiques";
                listEl.appendChild(h);
                return;
            }

            data[name] = { qty: 0, price: 0 };
            const card = document.createElement('div');
            card.className = 'item-card';

            card.innerHTML = `
                <div class="item-header">
                    <span class="item-name">${name}</span>
                    <div class="price-tag">
                        <input type="number" step="0.01" class="price-input" id="p-${name}" placeholder="0.00" oninput="updatePrice('${name}', this.value)" inputmode="decimal">
                        <span style="font-weight:800; color:var(--brand-green); font-size:0.8rem">€</span>
                    </div>
                </div>
                <div class="qty-grid">
                    <button class="btn-plus" onclick="updateQty('${name}', 1)">+1</button>
                    <button class="btn-plus" onclick="updateQty('${name}', 1.5)">+1.5</button>
                    <button class="btn-opt" onclick="updateQty('${name}', 2)">+2</button>
                    <button class="btn-opt" onclick="updateQty('${name}', 3)">+3</button>
                    <button class="btn-opt" onclick="updateQty('${name}', 5)">+5</button>
                    <button class="btn-zero" onclick="updateQty('${name}', 0, true)">0</button>
                </div>
                <div class="card-footer">
                    <span class="qty-label">En panier</span>
                    <span class="qty-val" id="q-${name}">0</span>
                </div>
            `;
            listEl.appendChild(card);
        });
    }

    function updateQty(name, val, reset = false) {
        if(reset) data[name].qty = 0;
        else data[name].qty += val;
        document.getElementById(`q-${name}`).innerText = data[name].qty;
        calculateTotal();
    }

    function updatePrice(name, val) {
        data[name].price = parseFloat(val) || 0;
        calculateTotal();
    }

    function calculateTotal() {
        let total = 0;
        for (let item in data) {
            total += data[item].qty * data[item].price;
        }
        document.getElementById('grand-total').innerText = total.toFixed(2);
    }

    function resetEverything() {
        if(confirm("Réinitialiser toute la liste ?")) {
            for (let name in data) {
                data[name].qty = 0;
                data[name].price = 0;
                if(document.getElementById(`q-${name}`)) document.getElementById(`q-${name}`).innerText = "0";
                if(document.getElementById(`p-${name}`)) document.getElementById(`p-${name}`).value = "";
            }
            calculateTotal();
            window.scrollTo({top: 0, behavior: 'smooth'});
        }
    }

    function filterItems() {
        let q = document.getElementById('search').value.toLowerCase();
        let cards = document.getElementsByClassName('item-card');
        Array.from(cards).forEach(card => {
            let name = card.querySelector('.item-name').innerText.toLowerCase();
            card.style.display = name.includes(q) ? 'block' : 'none';
        });
    }

    function share(type) {
        let text = type === 'all' ? "🍏 ACHATS VERGERS DE NOISY\n" : "💰 PRIX DU JOUR\n";
        let hasData = false;
        
        for (let item in data) {
            // Logique de partage PANIER COMPLET
            if (type === 'all' && data[item].qty > 0) {
                let st = data[item].qty * data[item].price;
                text += `\n• ${item} : ${data[item].qty} x ${data[item].price}€ = ${st.toFixed(2)}€`;
                hasData = true;
            } 
            // Logique de partage PRIX SEULS
            else if (type === 'prices' && data[item].price > 0) {
                text += `\n• ${item} : ${data[item].price}€`;
                hasData = true;
            }
        }
        
        if (type === 'all') text += `\n\n💵 TOTAL ESTIMÉ : ${document.getElementById('grand-total').innerText} €`;
        if (!hasData) return alert("Rien à partager ! Remplissez au moins un champ.");
        
        if (navigator.share) {
            navigator.share({ title: 'Achats Noisy', text: text });
        } else {
            navigator.clipboard.writeText(text);
            alert("Récapitulatif copié dans le presse-papier !");
        }
    }

    init();
</script>

</body>
</html>
